name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  desloppify:
    name: Desloppify Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install desloppify
        run: |
          git clone --depth 1 --no-recurse-submodules https://github.com/Open-Paws/desloppify.git /tmp/desloppify
          pip install "/tmp/desloppify[full]"

      - name: Run desloppify scan
        run: desloppify scan --path .

      - name: Check objective score meets threshold
        env:
          DESLOPPIFY_MIN_SCORE: "85"
        run: |
          python -c "
          import json, sys, pathlib, os, glob

          # Desloppify writes state to {project_root}/.desloppify/state.json
          # Project root is CWD (or DESLOPPIFY_ROOT env var).
          # Search both CWD and any nested .desloppify directories.
          candidates = list(pathlib.Path('.').glob('.desloppify/state*.json'))
          if not candidates:
              candidates = list(pathlib.Path('.').glob('**/.desloppify/state*.json'))
          if not candidates:
              print('No desloppify state file found — skipping score check.')
              sys.exit(0)

          state_path = candidates[0]
          print(f'Reading state from: {state_path}')
          state = json.loads(state_path.read_text())
          from desloppify.state_scoring import score_snapshot
          scores = score_snapshot(state)
          objective = scores.objective if scores.objective is not None else 100.0
          min_score = float(os.environ.get('DESLOPPIFY_MIN_SCORE', '85'))
          print(f'Objective score: {objective:.1f} (threshold: {min_score})')
          if objective < min_score:
              print(f'FAIL: objective {objective:.1f} < minimum {min_score}')
              sys.exit(1)
          print('PASS')
          "

  speciesist-language:
    name: Speciesist Language Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run no-animal-violence action
        uses: Open-Paws/no-animal-violence-action@main
        with:
          fail_on_violation: "true"
