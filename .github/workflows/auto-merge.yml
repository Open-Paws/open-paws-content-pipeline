# Auto-Merge GitHub Actions Workflow
# Deploy to: .github/workflows/auto-merge.yml in each target repo
#
# REPO-SPECIFIC OVERRIDES: Set DESLOPPIFY_THRESHOLD in repo secrets or vars.
#   Gary repo: 98 (set DESLOPPIFY_THRESHOLD=98)
#   Platform repos (open-paws-platform, open-paws-api-gateway): 90 (DESLOPPIFY_THRESHOLD=90)
#   All other repos: 85 (default — no override needed)
#
# REQUIRED SECRETS:
#   GH_PAT_AUTO_MERGE — PAT with repo + pull_request + write permissions (GITHUB_TOKEN cannot approve its own PRs)
#   CODERABBIT_API_KEY — from coderabbit.ai dashboard (optional; workflow degrades gracefully without it)
#
# REQUIRED LABELS (create via Wave -1 checklist):
#   needs-human-review — added when any gate fails; blocks auto-merge
#   human-gate — permanent block; never auto-merged regardless of gate state
#   auto-merge — added by workflow when all gates pass; triggers merge
#
# WORKFLOW LOGIC:
#   1. On PR open/update/sync: run all gate checks in parallel
#   2. If human-gate label present: exit immediately, no merge, no comment
#   3. If needs-human-review label present at check time: exit immediately
#   4. Run gates: CI tests + desloppify score + NAV scan + CodeRabbit approval
#   5. All pass: add auto-merge label, squash merge with structured commit message
#   6. Any fail: add needs-human-review label, post comment listing what failed

name: Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  workflow_run:
    workflows: ["*"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write
  checks: read
  issues: write

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Gate check: runs on every PR event. Evaluates all conditions.
  # ─────────────────────────────────────────────────────────────────
  gate-check:
    name: Auto-Merge Gate Check
    runs-on: ubuntu-latest
    # Skip draft PRs entirely
    if: github.event.pull_request.draft == false

    outputs:
      gates_passed: ${{ steps.evaluate.outputs.gates_passed }}
      failure_summary: ${{ steps.evaluate.outputs.failure_summary }}
      has_human_gate: ${{ steps.label-check.outputs.has_human_gate }}
      has_needs_human_review: ${{ steps.label-check.outputs.has_needs_human_review }}

    steps:
      - name: Check blocking labels
        id: label-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request?.number || context.payload.number,
            });
            const labels = pr.labels.map(l => l.name);
            const hasHumanGate = labels.includes('human-gate');
            const hasNeedsHumanReview = labels.includes('needs-human-review');
            core.setOutput('has_human_gate', hasHumanGate.toString());
            core.setOutput('has_needs_human_review', hasNeedsHumanReview.toString());
            core.setOutput('pr_number', pr.number.toString());
            core.setOutput('head_sha', pr.head.sha);
            if (hasHumanGate) {
              core.notice('PR has human-gate label — auto-merge permanently disabled for this PR.');
            }

      - name: Exit early if human-gate present
        if: steps.label-check.outputs.has_human_gate == 'true'
        run: |
          echo "human-gate label present. No action taken."
          exit 0

      - name: Checkout
        if: steps.label-check.outputs.has_human_gate != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CI status
        id: ci-check
        if: steps.label-check.outputs.has_human_gate != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.pull_request?.head?.sha || '${{ steps.label-check.outputs.head_sha }}';
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              per_page: 100,
            });
            // Exclude this workflow's own check run to avoid circular dependency
            const relevant = checks.check_runs.filter(c =>
              c.name !== 'Auto-Merge Gate Check' && c.name !== 'Auto-Merge'
            );
            const incomplete = relevant.filter(c => c.status !== 'completed');
            const failed = relevant.filter(c =>
              c.status === 'completed' && c.conclusion !== 'success' && c.conclusion !== 'skipped' && c.conclusion !== 'neutral'
            );
            const ciPassed = incomplete.length === 0 && failed.length === 0;
            core.setOutput('ci_passed', ciPassed.toString());
            if (!ciPassed) {
              const failNames = failed.map(c => c.name).join(', ');
              const incompleteNames = incomplete.map(c => c.name).join(', ');
              let msg = '';
              if (failNames) msg += `Failed checks: ${failNames}. `;
              if (incompleteNames) msg += `Incomplete checks: ${incompleteNames}.`;
              core.setOutput('ci_failure_detail', msg.trim());
            }

      - name: Set up Python for desloppify
        if: steps.label-check.outputs.has_human_gate != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install desloppify
        if: steps.label-check.outputs.has_human_gate != 'true'
        run: pip install --quiet "desloppify[full]"

      - name: Run desloppify score check
        id: desloppify-check
        if: steps.label-check.outputs.has_human_gate != 'true'
        env:
          # Repo-specific threshold override — set in repo vars or secrets
          # Gary: 98 | Platform repos: 90 | All others: 85 (default)
          DESLOPPIFY_THRESHOLD: ${{ vars.DESLOPPIFY_THRESHOLD || '85' }}
        run: |
          set -e
          # Run scan and capture JSON output
          desloppify scan --path . --output-format json > /tmp/desloppify-report.json 2>&1 || true
          # Extract strict score
          SCORE=$(python3 -c "
          import json, sys
          try:
              with open('/tmp/desloppify-report.json') as f:
                  data = json.load(f)
              score = data.get('strict_score', data.get('score', 0))
              print(int(score))
          except Exception as e:
              print(0)
          ")
          THRESHOLD="${DESLOPPIFY_THRESHOLD}"
          echo "desloppify_score=${SCORE}" >> "$GITHUB_OUTPUT"
          echo "desloppify_threshold=${THRESHOLD}" >> "$GITHUB_OUTPUT"
          if [ "$SCORE" -ge "$THRESHOLD" ]; then
            echo "desloppify_passed=true" >> "$GITHUB_OUTPUT"
            echo "Desloppify: PASS (score ${SCORE} >= threshold ${THRESHOLD})"
          else
            echo "desloppify_passed=false" >> "$GITHUB_OUTPUT"
            echo "Desloppify: FAIL (score ${SCORE} < threshold ${THRESHOLD})"
          fi

      - name: Check NAV (no-animal-violence) scan
        id: nav-check
        if: steps.label-check.outputs.has_human_gate != 'true'
        run: |
          set -e
          # Install semgrep if not present
          pip install --quiet semgrep 2>/dev/null || true
          # Run NAV scan — zero ERROR-severity violations required
          if [ -f "semgrep-no-animal-violence.yaml" ]; then
            RESULT=$(semgrep --config semgrep-no-animal-violence.yaml \
              --json \
              --include="*.py" --include="*.ts" --include="*.js" --include="*.md" \
              . 2>/dev/null || echo '{"results":[]}')
          else
            # NAV config not yet installed in this repo — flag as warning, not block
            echo "nav_passed=true" >> "$GITHUB_OUTPUT"
            echo "nav_note=semgrep-no-animal-violence.yaml not found — NAV suite install queued" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ERROR_COUNT=$(echo "$RESULT" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          errors = [r for r in data.get('results', []) if r.get('extra', {}).get('severity', '').upper() == 'ERROR']
          print(len(errors))
          " 2>/dev/null || echo "0")
          echo "nav_error_count=${ERROR_COUNT}" >> "$GITHUB_OUTPUT"
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "nav_passed=true" >> "$GITHUB_OUTPUT"
            echo "NAV scan: PASS (0 ERROR violations)"
          else
            echo "nav_passed=false" >> "$GITHUB_OUTPUT"
            echo "NAV scan: FAIL (${ERROR_COUNT} ERROR violations)"
          fi

      - name: Check CodeRabbit approval
        id: coderabbit-check
        if: steps.label-check.outputs.has_human_gate != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              // Triggered from check_suite or workflow_run — skip CodeRabbit check
              core.setOutput('coderabbit_passed', 'true');
              core.setOutput('coderabbit_note', 'Non-PR trigger — CodeRabbit check skipped');
              return;
            }
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });
            // Find CodeRabbit reviews (bot account name is 'coderabbitai[bot]')
            const crReviews = reviews.filter(r =>
              r.user?.login?.toLowerCase().includes('coderabbit') ||
              r.user?.type === 'Bot' && r.body?.toLowerCase().includes('coderabbit')
            );
            if (crReviews.length === 0) {
              // CodeRabbit has not reviewed yet — treat as pending, not a block
              // (auto-merge will be re-triggered when review is submitted)
              core.setOutput('coderabbit_passed', 'false');
              core.setOutput('coderabbit_note', 'CodeRabbit review pending — will re-evaluate on review submission');
              return;
            }
            // Most recent CodeRabbit review determines state
            const latest = crReviews[crReviews.length - 1];
            const hasApproval = crReviews.some(r => r.state === 'APPROVED');
            const hasCritical = crReviews.some(r =>
              r.state === 'CHANGES_REQUESTED' &&
              (r.body?.toUpperCase().includes('CRITICAL') || r.body?.toUpperCase().includes('MAJOR'))
            );
            if (hasApproval && !hasCritical) {
              core.setOutput('coderabbit_passed', 'true');
              core.setOutput('coderabbit_note', 'CodeRabbit approved — no outstanding CRITICAL/MAJOR issues');
            } else if (hasCritical) {
              core.setOutput('coderabbit_passed', 'false');
              core.setOutput('coderabbit_note', 'CodeRabbit flagged CRITICAL or MAJOR issues — address before merge');
            } else {
              core.setOutput('coderabbit_passed', 'false');
              core.setOutput('coderabbit_note', `CodeRabbit review state: ${latest.state} — awaiting approval`);
            }

      - name: Check validation-agent approval label
        id: validation-check
        if: steps.label-check.outputs.has_human_gate != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.setOutput('validation_passed', 'true');
              core.setOutput('validation_note', 'Non-PR trigger — validation check skipped');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const labels = pr.labels.map(l => l.name);
            // Validation agent sets 'validation-approved' label on APPROVE verdict
            // Level 0 tasks that skip validation agent still need this — orchestrator adds it
            const hasApproval = labels.includes('validation-approved') || labels.includes('auto-merge');
            if (hasApproval) {
              core.setOutput('validation_passed', 'true');
            } else {
              core.setOutput('validation_passed', 'false');
              core.setOutput('validation_note', 'Validation agent approval label (validation-approved) not yet set');
            }

      - name: Evaluate all gates
        id: evaluate
        if: steps.label-check.outputs.has_human_gate != 'true'
        env:
          CI_PASSED: ${{ steps.ci-check.outputs.ci_passed }}
          CI_FAILURE: ${{ steps.ci-check.outputs.ci_failure_detail }}
          DSL_PASSED: ${{ steps.desloppify-check.outputs.desloppify_passed }}
          DSL_SCORE: ${{ steps.desloppify-check.outputs.desloppify_score }}
          DSL_THRESHOLD: ${{ steps.desloppify-check.outputs.desloppify_threshold }}
          NAV_PASSED: ${{ steps.nav-check.outputs.nav_passed }}
          NAV_ERRORS: ${{ steps.nav-check.outputs.nav_error_count }}
          NAV_NOTE: ${{ steps.nav-check.outputs.nav_note }}
          CR_PASSED: ${{ steps.coderabbit-check.outputs.coderabbit_passed }}
          CR_NOTE: ${{ steps.coderabbit-check.outputs.coderabbit_note }}
          VA_PASSED: ${{ steps.validation-check.outputs.validation_passed }}
          VA_NOTE: ${{ steps.validation-check.outputs.validation_note }}
        run: |
          FAILURES=()
          [ "$CI_PASSED" != "true" ] && FAILURES+=("CI tests: ${CI_FAILURE:-checks not all green}")
          [ "$DSL_PASSED" != "true" ] && FAILURES+=("Desloppify: score ${DSL_SCORE} below threshold ${DSL_THRESHOLD}")
          [ "$NAV_PASSED" != "true" ] && FAILURES+=("NAV scan: ${NAV_ERRORS} ERROR violation(s) — ${NAV_NOTE}")
          [ "$CR_PASSED" != "true" ] && FAILURES+=("CodeRabbit: ${CR_NOTE}")
          [ "$VA_PASSED" != "true" ] && FAILURES+=("Validation agent: ${VA_NOTE}")

          if [ ${#FAILURES[@]} -eq 0 ]; then
            echo "gates_passed=true" >> "$GITHUB_OUTPUT"
            echo "failure_summary=" >> "$GITHUB_OUTPUT"
            echo "All gates passed."
          else
            echo "gates_passed=false" >> "$GITHUB_OUTPUT"
            # Build newline-separated failure summary for PR comment
            SUMMARY=$(printf "- %s\n" "${FAILURES[@]}")
            # Escape for GitHub Actions output (replace newlines with literal \n)
            SUMMARY_ESCAPED="${SUMMARY//$'\n'/\\n}"
            echo "failure_summary=${SUMMARY_ESCAPED}" >> "$GITHUB_OUTPUT"
            echo "Gate failures:"
            printf "  %s\n" "${FAILURES[@]}"
          fi

  # ─────────────────────────────────────────────────────────────────
  # Act on gate results: merge or label + comment
  # ─────────────────────────────────────────────────────────────────
  auto-merge:
    name: Merge or Escalate
    needs: gate-check
    runs-on: ubuntu-latest
    if: |
      needs.gate-check.outputs.has_human_gate != 'true' &&
      github.event.pull_request.draft == false

    steps:
      - name: Remove stale labels before acting
        if: needs.gate-check.outputs.gates_passed == 'true'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;
            // Remove needs-human-review if gates now pass (agent may have fixed issues)
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'needs-human-review',
              });
            } catch (e) {
              // Label may not be present — ignore 404
            }

      - name: Squash merge
        if: needs.gate-check.outputs.gates_passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.notice('No PR number available — skipping merge.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            // Construct a descriptive squash commit message
            const commitTitle = pr.title;
            const commitBody = [
              `Auto-merged by swarm infrastructure after all gates passed.`,
              ``,
              `PR: #${prNumber}`,
              `Branch: ${pr.head.ref}`,
              `Gates: CI ✓ | Desloppify ✓ | NAV scan ✓ | CodeRabbit ✓ | Validation ✓`,
              ``,
              pr.body ? `Original PR description:\n${pr.body}` : '',
            ].filter(Boolean).join('\n');
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: commitTitle,
                commit_message: commitBody,
              });
              core.notice(`PR #${prNumber} squash-merged successfully.`);
            } catch (err) {
              // Merge conflict or other issue — escalate to human
              core.setFailed(`Merge failed: ${err.message}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-human-review'],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## Auto-Merge Failed',
                  '',
                  'All gates passed but the merge itself failed. This requires human attention.',
                  '',
                  `**Error:** \`${err.message}\``,
                  '',
                  'Common causes: merge conflict, branch protection rule, required review count not met.',
                  '',
                  '**Action required:** Resolve the merge conflict or adjust branch protection settings, then re-trigger by pushing a new commit or removing and re-adding the `validation-approved` label.',
                ].join('\n'),
              });
            }

      - name: Add needs-human-review label on gate failure
        if: needs.gate-check.outputs.gates_passed != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;
            // Add label (idempotent — safe to call repeatedly)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['needs-human-review'],
            }).catch(() => {}); // Ignore if already present

      - name: Post failure comment
        if: needs.gate-check.outputs.gates_passed != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT_AUTO_MERGE || secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) return;
            const rawSummary = '${{ needs.gate-check.outputs.failure_summary }}';
            const summary = rawSummary.replace(/\\n/g, '\n');
            // Check if we already posted a failure comment to avoid spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 30,
            });
            const alreadyCommented = comments.some(c =>
              c.body?.includes('Auto-Merge Gate Check') &&
              c.user?.type === 'Bot'
            );
            if (alreadyCommented) {
              // Update the most recent failure comment instead of adding a new one
              const existing = [...comments].reverse().find(c =>
                c.body?.includes('Auto-Merge Gate Check') && c.user?.type === 'Bot'
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: buildComment(summary, prNumber),
                });
                return;
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: buildComment(summary, prNumber),
            });
            function buildComment(summary, prNumber) {
              return [
                '## Auto-Merge Gate Check — Blocked',
                '',
                'This PR has been labeled `needs-human-review` because one or more gates failed.',
                '',
                '### Failed Gates',
                summary,
                '',
                '### How to unblock',
                '- Fix the failing gates and push a new commit — this workflow will re-run automatically.',
                '- If CodeRabbit is pending, it will trigger a re-run when its review is submitted.',
                '- If all gates pass on re-run, the PR will be merged automatically.',
                '',
                '### Not an error? Label override available',
                '- **`human-gate`** — permanently blocks auto-merge; requires ED to manually review and merge.',
                '- Remove `needs-human-review` only after the underlying issue is resolved — the workflow re-adds it if gates still fail.',
                '',
                `*Auto-Merge Gate Check — ${new Date().toISOString()}*`,
              ].join('\n');
            }
